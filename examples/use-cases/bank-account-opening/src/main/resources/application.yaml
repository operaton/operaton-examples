spring:
  application:
    name: bank-account-opening
  datasource:
    url: jdbc:postgresql://localhost:5432/operaton
    username: operaton
    password: operaton
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

operaton:
  bpm:
    process-engine-plugins:
      - "org.operaton.connect.plugin.impl.ConnectProcessEnginePlugin"
    admin-user:
      id: demo
      password: demo
      first-name: Demo
    filter:
      create: All tasks
  worker:
    base-url: ${OPERATON_WORKER_BASE_URL:http://localhost:8080/engine-rest}
    enabled: ${OPERATON_WORKER_ENABLED:true}

llm:
  base-url: ${LLM_BASE_URL:http://localhost:11434}
  api-key: ${LLM_API_KEY:ollama}
  model: ${LLM_MODEL:llama3.2}

mail:
  from: ${MAIL_FROM:kyc@bankexample.com}
