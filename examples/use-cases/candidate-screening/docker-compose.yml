services:
  postgres:
    image: postgres:16-alpine
    container_name: candidate-screening-postgres
    environment:
      POSTGRES_DB: operaton
      POSTGRES_USER: operaton
      POSTGRES_PASSWORD: operaton
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operaton -d operaton"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: candidate-screening-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  ollama-pull:
    image: ollama/ollama:latest
    container_name: candidate-screening-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull llama3.2"]
    restart: "no"

  calendar-stub:
    image: wiremock/wiremock:3.5.4
    container_name: candidate-screening-calendar
    ports:
      - "8090:8080"
    volumes:
      - ./docker/calendar-stub/mappings:/home/wiremock/mappings
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/__admin/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: candidate-screening-mailpit
    ports:
      - "1025:1025"   # SMTP — Spring Mail connects here
      - "8025:8025"   # HTTP UI — http://localhost:8025
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8025/livez || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ollama:
