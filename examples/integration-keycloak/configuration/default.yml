operaton.bpm:
  run:
    cors:
      enabled: true
      allowed-origins: "*"
  authorization:
    enabled: true

spring.datasource:
  url: ${DB_URL:jdbc:postgresql://postgres:5432/operaton}
  driver-class-name: org.postgresql.Driver
  username: ${DB_USERNAME:operaton}
  password: ${DB_PASSWORD:operaton}

plugin.identity.keycloak:
  keycloakIssuerUrl: ${KEYCLOAK_HOST:http://keycloak:8080}/auth/realms/${KEYCLOAK_REALM:operaton}
  keycloakAdminUrl: ${KEYCLOAK_HOST:http://keycloak:8080}/auth/admin/realms/${KEYCLOAK_REALM:operaton}
  clientId: ${KEYCLOAK_CLIENT_ID:operaton-identity-service}
  clientSecret: ${KEYCLOAK_CLIENT_SECRET:operaton-keycloak-secret}
  useUsernameAsOperatonUserId: true
  useGroupPathAsOperatonGroupId: true
  administratorGroupName: operaton-admin
