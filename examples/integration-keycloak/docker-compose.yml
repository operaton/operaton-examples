services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: operaton
      POSTGRES_USER: operaton
      POSTGRES_PASSWORD: operaton
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operaton"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: keycloak/keycloak:26.6.3
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: keycloak
      KEYCLOAK_ADMIN_PASSWORD: keycloak
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /auth/health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q UP <&3"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  keycloak-config:
    image: keycloak/keycloak:26.6.3
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./keycloak/realm.json:/realm.json
    entrypoint:
      - /bin/sh
      - -c
      - |
        /opt/keycloak/bin/kcadm.sh config credentials \
          --server http://keycloak:8080/auth \
          --realm master --user keycloak --password keycloak \
        && /opt/keycloak/bin/kcadm.sh create realms --file /realm.json
    restart: "no"

  operaton:
    build: .
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/operaton
      DB_USERNAME: operaton
      DB_PASSWORD: operaton
      KEYCLOAK_HOST: http://keycloak:8080
      KEYCLOAK_REALM: operaton
      KEYCLOAK_CLIENT_ID: operaton-identity-service
      KEYCLOAK_CLIENT_SECRET: operaton-keycloak-secret
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-config:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/engine-rest/engine || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
