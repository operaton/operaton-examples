services:
  postgres:
    image: postgres:16-alpine
    container_name: integration-rest-postgres
    environment:
      POSTGRES_DB: operaton
      POSTGRES_USER: operaton
      POSTGRES_PASSWORD: operaton
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operaton -d operaton"]
      interval: 5s
      timeout: 3s
      retries: 10

  wiremock:
    image: wiremock/wiremock:3.5.4
    container_name: integration-rest-wiremock
    ports:
      - "8090:8080"
    volumes:
      - ./src/test/resources/wiremock:/home/wiremock
