services:
  postgres:
    image: postgres:16-alpine
    container_name: integration-mail-postgres
    environment:
      POSTGRES_DB: operaton
      POSTGRES_USER: operaton
      POSTGRES_PASSWORD: operaton
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operaton -d operaton"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: integration-mail-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
