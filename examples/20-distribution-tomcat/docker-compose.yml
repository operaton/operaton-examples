services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: operaton
      POSTGRES_USER: operaton
      POSTGRES_PASSWORD: operaton
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operaton"]
      interval: 5s
      timeout: 5s
      retries: 5

  tomcat:
    image: operaton/tomcat:2.1.1
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/operaton
      DB_USERNAME: operaton
      DB_PASSWORD: operaton
      DB_DRIVER: org.postgresql.Driver
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./target/distribution-tomcat-0.1.0-SNAPSHOT.war:/operaton/webapps/document-approval.war
