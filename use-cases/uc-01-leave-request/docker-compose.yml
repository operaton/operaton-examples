services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: uc-01-leave-request
      POSTGRES_USER: operaton
      POSTGRES_PASSWORD: operaton
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operaton"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
