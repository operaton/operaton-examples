name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      maven-examples: ${{ steps.maven.outputs.examples }}
      gradle-examples: ${{ steps.gradle.outputs.examples }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: changed
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            base_ref="origin/${{ github.base_ref }}"
          else
            base_ref="origin/main"
          fi
          changed=$(git diff --name-only --diff-filter=d "$base_ref" 2>/dev/null \
            | grep -o '^examples/[^/]*' | sort -u | sed 's|examples/||' \
            | jq -R . | jq -cs . 2>/dev/null || echo "[]")
          if [ "$changed" == "[]" ]; then
            changed=$(ls -d examples/*/ | sed 's|/$||' | sed 's|examples/||' | jq -R . | jq -cs .)
          fi
          echo "list=$changed" >> "$GITHUB_OUTPUT"
          echo "Changed examples: $changed"

      - id: maven
        run: |
          echo "examples=${{ steps.changed.outputs.list }}" >> "$GITHUB_OUTPUT"
          echo "Maven examples: ${{ steps.changed.outputs.list }}"

      - id: gradle
        run: |
          changed='${{ steps.changed.outputs.list }}'
          gradle_all=$(find examples -name "build.gradle*" \
            | sed 's|examples/||' | sed 's|/.*||' | sort -u \
            | jq -R . | jq -cs .)
          gradle=$(echo "$changed" | jq -c --argjson all "$gradle_all" \
            '[.[] | select(. as $e | $all | any(. == $e))]')
          echo "examples=$gradle" >> "$GITHUB_OUTPUT"
          echo "Gradle examples: $gradle"

  build-maven:
    needs: discover
    if: needs.discover.outputs.maven-examples != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJson(needs.discover.outputs.maven-examples) }}
    name: ${{ matrix.example }} (maven)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Build and test (Maven)
        working-directory: examples/${{ matrix.example }}
        run: ./mvnw -B -ntp verify

  build-gradle:
    needs: discover
    if: needs.discover.outputs.gradle-examples != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJson(needs.discover.outputs.gradle-examples) }}
    name: ${{ matrix.example }} (gradle)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Build and test (Gradle)
        working-directory: examples/${{ matrix.example }}
        run: ./gradlew build --no-daemon
