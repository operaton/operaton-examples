name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.list.outputs.examples }}
      gradle-examples: ${{ steps.gradle.outputs.examples }}
      changed-examples: ${{ steps.changed.outputs.examples }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: list
        run: |
          examples=$(ls -d examples/*/ | sed 's|/$||' | jq -R . | jq -cs .)
          echo "examples=$examples" >> "$GITHUB_OUTPUT"
          echo "Discovered: $examples"
      - id: gradle
        run: |
          gradle_examples=$(find examples -name "build.gradle*" | sed 's|.*examples/||' | sed 's|/.*||' | sort -u | jq -R . | jq -cs .)
          echo "examples=$gradle_examples" >> "$GITHUB_OUTPUT"
          echo "Gradle examples: $gradle_examples"
      - id: changed
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            base_ref="${{ github.base_ref }}"
          else
            base_ref="HEAD~1"
          fi
          changed=$(git diff --name-only --diff-filter=d $base_ref | grep -o '^examples/[^/]*' | sort -u | sed 's|examples/||' | jq -R . | jq -cs . || echo "[]")
          echo "examples=$changed" >> "$GITHUB_OUTPUT"
          echo "Changed examples: $changed"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJson(needs.discover.outputs.changed-examples) }}
        build: [maven, gradle]
    name: ${{ matrix.example }} (${{ matrix.build }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: ${{ matrix.build }}
      - name: Build and test (Maven)
        if: matrix.build == 'maven'
        working-directory: ${{ matrix.example }}
        run: ./mvnw -B -ntp verify
      - name: Build and test (Gradle)
        if: |
          matrix.build == 'gradle' &&
          contains(fromJson(needs.discover.outputs.gradle-examples), matrix.example)
        working-directory: ${{ matrix.example }}
        run: ./gradlew build --no-daemon
