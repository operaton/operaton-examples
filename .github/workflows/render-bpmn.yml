name: Render BPMN diagrams

on:
  push:
    paths:
      - '**/*.bpmn'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the auto-commit can push back
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install bpmn-to-image
        run: npm install -g bpmn-to-image

      # Ubuntu 24.04 (ubuntu-latest) restricts unprivileged user namespaces via
      # AppArmor, which breaks Chromium's sandbox used by bpmn-to-image/Puppeteer.
      # Lift the restriction so the sandbox launches normally.
      - name: Allow unprivileged user namespaces (Chromium sandbox)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Render BPMN files to PNG
        run: bash scripts/render-bpmn.sh

      - name: Commit rendered PNGs
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'ci: render BPMN diagrams to PNG [skip ci]'
          file_pattern: '**/*.png'
