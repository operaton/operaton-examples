version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    groups:
      operaton:
        patterns:
          - "org.operaton*"
      spring-boot:
        patterns:
          - "org.springframework.boot*"
      testcontainers:
        patterns:
          - "org.testcontainers*"

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    groups:
      operaton:
        patterns:
          - "org.operaton*"
      spring-boot:
        patterns:
          - "org.springframework.boot*"
      testcontainers:
        patterns:
          - "org.testcontainers*"
