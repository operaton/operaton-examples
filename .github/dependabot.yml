version: 2
updates:

  # ── GitHub Actions ───────────────────────────────────────────────────────────

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  # ── Maven — one entry per example / use-case ─────────────────────────────────
  # Each module manages its own pom.xml; Dependabot must be pointed at each one.
  # The "all" group consolidates every update in that module into a single PR.

  - package-ecosystem: "maven"
    directory: "/examples/01-getting-started"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    groups:
      all:
        patterns: ["*"]

