  - id: async-continuation
    title: "Async Continuation"
    icon: "⚡"
    path: examples/async-continuation
    shortDescription: >
      asyncBefore/asyncAfter transaction boundaries, manual job execution in tests, and
      failedJobRetryTimeCycle for resilient retry scheduling.
    longDescription: |
      Shows how **async continuation** transforms what would be a single synchronous transaction
      into multiple independent jobs, enabling resilience, parallelism, and retry.

      - **`asyncBefore`** — the engine persists the token before executing the activity; the actual
        execution runs in a separate job/transaction
      - **`asyncAfter`** — the engine persists after activity completion; subsequent tasks run later
      - **Transaction boundaries** — each async point creates a separate DB transaction; process
        survives server restarts between async steps
      - **Manual job execution** — `ManagementService.executeJob()` triggers async jobs in tests
        without a running job executor
      - **`failedJobRetryTimeCycle`** — ISO 8601 repeat expression (`R3/PT10M`) schedules retries
        with backoff on delegate failure
      - **Exclusive jobs** — `operaton:exclusive="true"` prevents parallel execution of jobs
        for the same process instance

      Essential for production deployments where service calls must survive transient failures.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: advanced
