  - id: dmn-decision
    title: "DMN Decision"
    icon: "üìä"
    path: examples/dmn-decision
    shortDescription: >
      DMN decision tables and a Decision Requirements Diagram evaluated from a Business
      Rule Task inside a BPMN process.
    longDescription: |
      Demonstrates Operaton's native DMN engine for externalising business rules from process logic.

      - **DMN decision table** ‚Äî maps input variables to output via hit policies (FIRST, UNIQUE)
      - **Decision Requirements Diagram (DRD)** ‚Äî two decisions wired by data dependency
      - **Business Rule Task** ‚Äî binds a decision key to a BPMN task; result written to a variable
      - **Expression-based routing** ‚Äî exclusive gateway reads the DMN output to pick a path
      - **DMN unit test** ‚Äî `DmnEngine.evaluate()` directly against the `.dmn` file

      Rules are in a `.dmn` file; swapping them requires no Java code changes.
