  - id: error-compensation
    title: "Error Compensation"
    icon: "↩️"
    path: examples/08-error-compensation
    shortDescription: >
      BPMN compensation (saga pattern) with compensation handlers and BpmnError-triggered rollback.
    longDescription: |
      Models a distributed transaction using the **BPMN compensation** mechanism — the process
      equivalent of a saga pattern.

      - **Compensation boundary event** — attaches a rollback task to a completed activity
      - **Compensation handler** — the task that undoes a prior step (e.g., refund a charge)
      - **Compensation throw event** — explicitly triggers compensation for a scope
      - **BpmnError propagation** — a delegate throws `BpmnError`; the boundary event catches it
        and triggers compensation
      - **Multi-step saga** — three service tasks each with their own compensation handler,
        all triggered atomically on failure

      Compensation in BPMN does not use database rollback — it executes compensating business logic.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: advanced
    tags:
      - { label: "Compensation", category: concept }
      - { label: "Saga Pattern", category: concept }
      - { label: "BpmnError", category: concept }
    integrations: [postgres]
    bpmnConcepts: [compensation-boundary-event, compensation-handler, compensation-throw-event, bpmn-error]
    requires: "Java 21+, Docker"
    authors:
      - { name: "Karsten Thoms", url: "https://github.com/kthoms" }
    license: "Apache-2.0"
    documentationUrl: "https://github.com/kthoms/operaton-examples/blob/main/examples/08-error-compensation/README.md"
    lastUpdated: "2026-06-15"

  - id: multi-instance
    title: "Multi-Instance"
    icon: "🔀"
    path: examples/09-multi-instance
    shortDescription: >
      Parallel multi-instance user tasks over a collection, with a completion condition that
      terminates early once enough approvals are received.
    longDescription: |
      Demonstrates **multi-instance subprocesses** — a BPMN built-in for iterating a task or
      subprocess over a list, optionally in parallel.

      - **Parallel multi-instance** — one token per item in the input collection, all active simultaneously
      - **Sequential multi-instance** — items processed one after another (second variant shown)
      - **Completion condition** — `${nrOfCompletedInstances >= 2}` terminates the loop early
        once a majority has approved (majority-vote pattern)
      - **Loop variables** — `loopCounter`, `nrOfInstances`, `nrOfCompletedInstances` available
        inside the loop body
      - **Collection input** — the BPMN `operaton:collection` and `operaton:elementVariable` attributes

      Real-world use: send to N reviewers in parallel, continue once K have responded.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: intermediate
    tags:
      - { label: "Multi-Instance", category: concept }
      - { label: "Parallel", category: concept }
      - { label: "Completion Condition", category: concept }
    integrations: [postgres]
    bpmnConcepts: [parallel-multi-instance, sequential-multi-instance, completion-condition, user-task]
