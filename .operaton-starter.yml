  - id: runtime-quarkus
    title: "Runtime — Quarkus"
    icon: "☕"
    path: examples/19-runtime-quarkus
    shortDescription: >
      Embedded Operaton engine on Quarkus/CDI — named CDI delegates, process deployment via
      OperatonEngineStartupEvent, and @QuarkusTest integration tests.
    longDescription: |
      Demonstrates that Operaton is not tied to Spring Boot — the engine runs equally well
      on **Quarkus** with CDI bean injection and Agroal JDBC.

      - **`operaton-bpm-quarkus-engine`** — the Quarkus extension providing a CDI-managed
        `ProcessEngine` bean and `ProcessEngineConfiguration`
      - **Named datasource** — `quarkus.datasource.operaton-db.*` + `quarkus.operaton.datasource=operaton-db`
        connects the engine to a named Agroal pool
      - **CDI delegate** — `@ApplicationScoped @Named("validateOrderDelegate")` resolved by
        `${validateOrderDelegate}` in the BPMN; no Spring annotation needed
      - **Explicit BPMN deployment** — the Quarkus extension does NOT auto-scan the classpath;
        an `@Observes OperatonEngineStartupEvent` bean deploys the BPMN via `RepositoryService`
      - **`@QuarkusTest` + `QuarkusTestResourceLifecycleManager`** — `PostgresTestResource`
        starts a Testcontainers Postgres and injects the JDBC URL before Quarkus boots
      - **assertj-core** — must be declared explicitly; it is not transitive from the Quarkus BOM

      Two test scenarios: order total < 1000 → approved; total ≥ 1000 → rejected.
    buildSystem: maven
    runtime: quarkus
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: intermediate
    tags:
