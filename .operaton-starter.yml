  - id: incident-management
    title: "Use Case ‚Äî Incident Management"
    icon: "üö®"
    path: examples/use-cases/incident-management
    shortDescription: >
      IT support ticket with signal escalation boundary, timer SLA boundary, 4-swimlane BPMN
      and REST resolution API.
    longDescription: |
      A realistic ITSM (IT Service Management) use case modelling a support ticket from
      receipt to resolution, with two independent escalation paths.

      - **4-lane BPMN** ‚Äî Customer, L1 Support, L2 Support, and Management lanes making
        the responsibility boundaries visually explicit
      - **Interrupting timer boundary event** ‚Äî SLA breach after 4 hours automatically
        escalates the ticket to L2
      - **Non-interrupting signal boundary event** ‚Äî a customer callback signal triggers a
        parallel notification without disrupting active work
      - **REST resolution API** ‚Äî `POST /incidents/{id}/resolve` correlates a message to
        the waiting process instance
      - **Reopen path** ‚Äî after resolution, the customer can reopen the ticket within a
        satisfaction window via a boundary message event

      Demonstrates how BPMN lanes, boundaries, and message correlation model real
      enterprise workflows without code sprawl.
