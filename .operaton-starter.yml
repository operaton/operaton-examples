  - id: distribution-wildfly
    title: "Distribution ‚Äî WildFly"
    icon: "üî•"
    path: examples/distribution-wildfly
    shortDescription: >
      Process-application WAR deployed into the operaton/wildfly Docker image ‚Äî Operaton
      as a WildFly subsystem, CDI enabled via beans.xml.
    longDescription: |
      The **WildFly** counterpart to the Tomcat distribution example ‚Äî same process application
      model, different container, with WildFly-specific CDI wiring.

      - **`operaton/wildfly:2.1.1`** ‚Äî the official Operaton WildFly distribution Docker image;
        Operaton is installed as a WildFly subsystem module
      - **`ServletProcessApplication`** ‚Äî same Java EE approach as Tomcat; `@WebListener` and
        `@ProcessApplication` on the WAR's entry point class
      - **`WEB-INF/beans.xml`** ‚Äî CDI marker file required for WildFly to activate CDI bean
        scanning in the WAR (not needed on Tomcat with Weld on the classpath)
      - **Autodeploy directory** ‚Äî WAR is mounted at
        `/opt/jboss/wildfly/standalone/deployments/`; WildFly picks it up and creates
        `*.war.deployed` on success
      - **Testcontainers e2e IT** ‚Äî `GenericContainer("operaton/wildfly:2.1.1")` with a 300s
        startup timeout (WildFly takes longer than Tomcat to initialise the subsystem)
      - **Same REST assertion pattern** as the Tomcat example ‚Äî `history/activity-instance?activityType=noneEndEvent`

      Demonstrates that the same process application source is portable across Tomcat and WildFly.
    buildSystem: maven
    runtime: other
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: intermediate
