  - id: order-fulfillment
    title: "Use Case — Order Fulfillment"
    icon: "📦"
    path: use-cases/uc-04-order-fulfillment
    shortDescription: >
      E-commerce order with error boundary on payment, async continuation for resilience,
      and WireMock stubs for inventory and payment services.
    longDescription: |
      An e-commerce order processing use case that combines async resilience, error recovery,
      and downstream REST stubs — ready for adaptation to real microservice integrations.

      - **Parallel gateway** — inventory reservation and payment authorisation run concurrently
      - **Error boundary on payment** — a `BpmnError("PAYMENT_DECLINED")` reroutes to a
        user task for manual retry or order cancellation
      - **Async continuation** — `asyncBefore` on the payment step isolates the payment
        transaction; a server restart between steps does not lose the order
      - **WireMock** — inventory (`/inventory/reserve`) and payment (`/payment/charge`) REST
        services are stubbed; error scenario returns 402
      - **Compensation** — if cancellation is chosen, compensation handlers unreserve inventory
        and void any partial authorisation

      A production-grade template for multi-service order orchestration.
