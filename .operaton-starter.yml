  - id: leave-request
    title: "Use Case ‚Äî Leave Request"
    icon: "üèñÔ∏è"
    path: examples/use-cases/leave-request
    shortDescription: >
      Employee leave approval with manager user task, non-interrupting timer escalation, and
      vacation balance validation via a service.
    longDescription: |
      A realistic HR use case that combines user tasks, timer escalation, and a backend service.

      - **Leave submission** ‚Äî employee starts the process via REST with start and end dates
      - **Manager approval task** ‚Äî assigned to the employee's manager via candidate group
      - **Non-interrupting timer escalation** ‚Äî if the manager has not acted within 48 hours,
        an escalation email is sent; the task remains open
      - **Vacation balance service** ‚Äî a delegate checks remaining days against a database;
        if insufficient, a `BpmnError` rejects the request immediately
      - **SQL schema initialisation** ‚Äî `DataInitializer` creates and seeds the balance table
        on startup

      The integration test covers all three outcomes: approved, rejected (insufficient balance),
      and escalation triggered.
