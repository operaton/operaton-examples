  - id: operations-flowset-control
    title: "Operations — Flowset Control"
    icon: "🎛️"
    path: examples/22-operations-flowset-control
    shortDescription: >
      operaton/operaton with built-in webapps disabled; Flowset Control Community as the
      external operations UI — docker-compose + smoke IT.
    longDescription: |
      Demonstrates how to run the Operaton engine **without its bundled web applications**
      (Cockpit, Tasklist, Admin) and substitute an external operations UI.

      - **`operaton/operaton:2.1.1`** — the all-in-one Docker image; webapps disabled by
        setting `SKIP_DB_CONFIG=false` and overriding the webapp deployment flags
      - **Flowset Control Community** (`flowset/flowset-control-community`) — an open-source
        operations and monitoring UI for Operaton; connects via the standard REST API
      - **4-service `docker-compose.yml`** — PostgreSQL, Operaton engine (no webapps),
        Flowset Control, and a WireMock stub for the demo process
      - **Webapps-disabled configuration** — environment variables that suppress Cockpit/Tasklist
        deployment while keeping the REST API and job executor active
      - **Smoke integration test** — `OperationsIT` verifies that the engine REST API responds,
        that Flowset Control UI is reachable, and that a test process can be started and
        queried via the REST API

      This is the recommended pattern for production deployments where a custom or third-party
      front end replaces the built-in Operaton web applications.
