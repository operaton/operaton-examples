  - id: message-events
    title: "Message Events"
    icon: "✉️"
    path: examples/06-message-events
    shortDescription: >
      Message start event, intermediate message catch, and business-key correlation —
      integrating external systems by sending named messages.
    longDescription: |
      Shows how processes communicate with the outside world using **message events** —
      the standard BPMN mechanism for point-to-point, named, correlated messages.

      - **Message Start Event** — a REST call delivers a message to start a new process instance
      - **Intermediate Message Catch Event** — the process parks at a wait state until a message arrives
      - **Business key correlation** — `RuntimeService.correlateMessage()` with a business key finds
        the right waiting instance without knowing its internal ID
      - **Two-message flow** — process starts on one message and resumes on a second message

      Real-world patterns: order placed → order shipped, payment initiated → payment confirmed.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: intermediate
    tags:
      - { label: "Message Event", category: concept }
      - { label: "Correlation", category: concept }
    integrations: [postgres]
    bpmnConcepts: [message-start-event, intermediate-message-catch-event, correlation, business-key]
    requires: "Java 21+, Docker"
    authors:
      - { name: "Karsten Thoms", url: "https://github.com/kthoms" }
    license: "Apache-2.0"
    documentationUrl: "https://github.com/kthoms/operaton-examples/blob/main/examples/06-message-events/README.md"
    screenshots:
