      and WireMock stubs for inventory and payment services.
    longDescription: |
      An e-commerce order processing use case that combines async resilience, error recovery,
      and downstream REST stubs ‚Äî ready for adaptation to real microservice integrations.

      - **Parallel gateway** ‚Äî inventory reservation and payment authorisation run concurrently
      - **Error boundary on payment** ‚Äî a `BpmnError("PAYMENT_DECLINED")` reroutes to a
        user task for manual retry or order cancellation
      - **Async continuation** ‚Äî `asyncBefore` on the payment step isolates the payment
        transaction; a server restart between steps does not lose the order
      - **WireMock** ‚Äî inventory (`/inventory/reserve`) and payment (`/payment/charge`) REST
        services are stubbed; error scenario returns 402
      - **Compensation** ‚Äî if cancellation is chosen, compensation handlers unreserve inventory
        and void any partial authorisation

      A production-grade template for multi-service order orchestration.
