apiVersion: operaton-starter/v1

repository:
  name: "Operaton Examples"
  description: "Curated, runnable examples illustrating common Operaton BPMN patterns and integrations."
  maintainer:
    name: "Karsten Thoms"
    url: "https://github.com/kthoms"

examples:

  # ── Core Examples ──────────────────────────────────────────────────────────

  - id: getting-started
    title: "Getting Started"
    icon: "🚀"
    path: examples/getting-started
    shortDescription: >
      Embedded engine, service task delegate, user task, exclusive gateway — the minimal
      working Operaton application on Spring Boot.
    longDescription: |
      The canonical "hello world" for Operaton. A single Spring Boot application embeds
      the process engine and deploys a simple order-approval process on startup.

      - **Service Task** — Java delegate sets an `approved` variable based on order value
      - **Exclusive Gateway** — routes to "Approved" or "Rejected" based on the variable
      - **User Task** — manual review step for borderline orders
      - **Integration test** — starts the process via the Java API, asserts the end state

      A PostgreSQL container is managed by Testcontainers; no manual setup required.
      The Operaton REST API and Cockpit are available at `localhost:8080` via `docker compose up`.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: beginner
    tags:
      - { label: "Service Task", category: concept }
      - { label: "User Task", category: concept }
      - { label: "Exclusive Gateway", category: concept }
    integrations: [postgres]
    bpmnConcepts: [service-task, user-task, exclusive-gateway]
    requires: "Java 21+, Docker"
    authors:
      - { name: "Karsten Thoms", url: "https://github.com/kthoms" }
    license: "Apache-2.0"
    documentationUrl: "https://github.com/kthoms/operaton-examples/blob/main/examples/getting-started/README.md"
    lastUpdated: "2026-06-15"

  - id: service-tasks
    title: "Service Tasks"
    icon: "⚙️"
    path: examples/service-tasks
    shortDescription: >
      Java delegates, expression delegates, BpmnError propagation, and job retry configuration
      on a single Spring Boot example.
    longDescription: |
      A deep-dive into all the ways Operaton executes service logic inside a process.

      - **Java delegate** — a `JavaDelegate` bean resolved by class reference
      - **Expression delegate** — a Spring bean resolved by EL expression (`${myBean}`)
      - **Inline expression** — `${execution.setVariable(...)}` directly in the BPMN
      - **BpmnError** — thrown by a delegate and caught by a boundary error event
      - **Job retry cycle** — `operaton:failedJobRetryTimeCycle` for transient failures

      All four service-invocation patterns are tested in a single integration test suite
      that asserts both the happy path and the error boundary path.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: beginner
    tags:
      - { label: "Service Task", category: concept }
      - { label: "BpmnError", category: concept }
      - { label: "Job Retry", category: concept }
    integrations: [postgres]
    bpmnConcepts: [service-task, bpmn-error, error-boundary-event, job-retry]
    requires: "Java 21+, Docker"
    authors:
      - { name: "Karsten Thoms", url: "https://github.com/kthoms" }
    license: "Apache-2.0"
    documentationUrl: "https://github.com/kthoms/operaton-examples/blob/main/examples/service-tasks/README.md"
    screenshots:
      - examples/service-tasks/src/main/resources/payment-processing.png
    lastUpdated: "2026-06-15"

  - id: external-task-worker
    title: "External Task Worker"
    icon: "🔌"
    path: examples/external-task-worker
    shortDescription: >
      Long-polling external task worker that fetches-and-locks work items from a topic
      and completes them asynchronously.
    longDescription: |
      Demonstrates the **external task pattern** — the engine publishes work items to a
      topic and a worker polls for them. This decouples the process engine from the
      service implementation and supports multiple languages and runtimes as workers.

      - `ExternalTaskService.fetchAndLock()` — polls for tasks on a named topic
      - Lock expiry and failure handling — `handleFailure()` with retry count and backoff
      - Variable passing — the worker reads input variables and sets output variables on complete
      - Long-polling — efficient push-style polling with a configurable wait time

      The example ships a worker alongside a Spring Boot engine; both run in the same JVM
      to keep the setup simple, but the pattern applies equally to separate deployments.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: intermediate
    tags:
      - { label: "External Task", category: concept }
      - { label: "Long Polling", category: concept }
    integrations: [postgres]
    bpmnConcepts: [external-task, service-task]
    requires: "Java 21+, Docker"
    authors:
      - { name: "Karsten Thoms", url: "https://github.com/kthoms" }
    license: "Apache-2.0"
    documentationUrl: "https://github.com/kthoms/operaton-examples/blob/main/examples/external-task-worker/README.md"
    screenshots:
      - examples/external-task-worker/src/main/resources/order-fulfillment.png
    lastUpdated: "2026-06-15"

  - id: user-task-forms
    title: "User Task Forms"
    icon: "📋"
    path: examples/user-task-forms
    shortDescription: >
      User tasks with embedded Operaton forms, task lifecycle management (claim, complete),
      and form variable handling via the Task API.
    longDescription: |
      Shows how to build human-centric workflows where operators interact with structured forms.

      - **Embedded form** — form fields defined directly in the BPMN with `operaton:formField`
      - **Task API** — create, claim, and complete tasks programmatically
      - **Form variables** — submitted form values are written back as process variables
      - **Task lifecycle** — demonstrates the full claim → work → complete flow
      - **Candidate groups** — tasks are assigned to a group, not an individual

      The integration test uses the `TaskService` directly; no Tasklist UI is required.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
