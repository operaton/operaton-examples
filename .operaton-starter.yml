  - id: dmn-decision
    title: "DMN Decision"
    icon: "📊"
    path: examples/dmn-decision
    shortDescription: >
      DMN decision tables and a Decision Requirements Diagram evaluated from a Business
      Rule Task inside a BPMN process.
    longDescription: |
      Demonstrates Operaton's native DMN engine for externalising business rules from process logic.

      - **DMN decision table** — maps input variables to output via hit policies (FIRST, UNIQUE)
      - **Decision Requirements Diagram (DRD)** — two decisions wired by data dependency
      - **Business Rule Task** — binds a decision key to a BPMN task; result written to a variable
      - **Expression-based routing** — exclusive gateway reads the DMN output to pick a path
      - **DMN unit test** — `DmnEngine.evaluate()` directly against the `.dmn` file

      Rules are in a `.dmn` file; swapping them requires no Java code changes.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: intermediate
    tags:
      - { label: "DMN", category: concept }
      - { label: "Business Rule Task", category: concept }
      - { label: "Decision Table", category: concept }
    integrations: [postgres, dmn]
    bpmnConcepts: [business-rule-task, exclusive-gateway, dmn-decision-table, drd]
