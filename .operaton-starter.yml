  - id: event-subprocess
    title: "Event Subprocess"
    icon: "üîî"
    path: examples/event-subprocess
    shortDescription: >
      Non-interrupting signal audit subprocess for cross-cutting concerns and interrupting
      error handler subprocess for global error handling.
    longDescription: |
      Demonstrates **event subprocesses** ‚Äî special subprocesses that are triggered by events
      and run in the scope of their parent process or subprocess.

      - **Non-interrupting event subprocess** ‚Äî triggered by a signal; the parent process continues
        in parallel; used for audit logging, side-effect notifications
      - **Interrupting event subprocess** ‚Äî triggered by an error event; replaces the normal
        flow for global error handling (like a try/catch around the entire process)
      - **Scope hierarchy** ‚Äî the event subprocess shares variables with its parent scope
      - **Embedded vs. top-level** ‚Äî showing both an embedded event subprocess inside a
        subprocess and a top-level one at the process level

