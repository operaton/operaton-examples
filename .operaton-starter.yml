        an `@Observes OperatonEngineStartupEvent` bean deploys the BPMN via `RepositoryService`
      - **`@QuarkusTest` + `QuarkusTestResourceLifecycleManager`** — `PostgresTestResource`
        starts a Testcontainers Postgres and injects the JDBC URL before Quarkus boots
