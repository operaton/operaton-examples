  - id: timer-events
    title: "Timer Events"
    icon: "‚è±Ô∏è"
    path: examples/timer-events
    shortDescription: >
      Timer boundary event for SLA escalation, testing timers via job manipulation,
      and failedJobRetryTimeCycle configuration.
    longDescription: |
      Teaches time-based process control ‚Äî how to escalate, cancel, or retry based on elapsed time.

      - **Non-interrupting timer boundary event** ‚Äî fires an escalation email after an SLA without
        cancelling the original task
      - **Interrupting timer boundary event** ‚Äî cancels the task and reroutes on timeout
      - **ISO 8601 duration** ‚Äî `PT1H`, `R3/PT10M` (repeat) in BPMN `timeDuration`
      - **Testing with job API** ‚Äî `ManagementService.executeJob()` triggers timers in tests
        without Thread.sleep or clock manipulation
      - **failedJobRetryTimeCycle** ‚Äî configures automatic retry backoff on job failure

      Knowing how to test timers without real wall-clock waiting is essential for CI.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: intermediate
    tags:
