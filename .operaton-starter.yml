  - id: integration-rest
    title: "Integration — REST"
    icon: "🌐"
    path: examples/integration-rest
    shortDescription: >
      REST service calls via RestTemplate, 4xx/5xx response mapped to BpmnError, and WireMock
      Testcontainers for full integration testing.
    longDescription: |
      The standard pattern for calling external REST services from a BPMN process, including
      error handling without mocking the HTTP layer.

      - **RestTemplate in a Java delegate** — synchronous HTTP call with response binding
      - **4xx → BpmnError mapping** — non-2xx responses throw `BpmnError` and route to an
        error boundary event (e.g., "credit service unavailable")
      - **WireMock Testcontainers** — a real WireMock container stubs the downstream service;
        no mocking in the test class itself
      - **Stub scenarios** — success stub returns a JSON payload; error stub returns 503 to
        trigger the error path
      - **Dynamic URL injection** — the WireMock container URL is injected via Spring properties
        so the delegate always points at the stub in tests

      This pattern applies equally to any HTTP-based downstream (payment, scoring, inventory).
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: intermediate
    tags:
      - { label: "REST", category: integration }
      - { label: "WireMock", category: integration }
      - { label: "BpmnError", category: concept }
    integrations: [rest, wiremock, postgres]
    bpmnConcepts: [service-task, bpmn-error, error-boundary-event]
    requires: "Java 21+, Docker"
    authors:
