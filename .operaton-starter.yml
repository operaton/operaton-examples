  - id: async-continuation
    title: "Async Continuation"
    icon: "⚡"
    path: examples/17-async-continuation
    shortDescription: >
      asyncBefore/asyncAfter transaction boundaries, manual job execution in tests, and
      failedJobRetryTimeCycle for resilient retry scheduling.
    longDescription: |
      Shows how **async continuation** transforms what would be a single synchronous transaction
      into multiple independent jobs, enabling resilience, parallelism, and retry.

      - **`asyncBefore`** — the engine persists the token before executing the activity; the actual
        execution runs in a separate job/transaction
      - **`asyncAfter`** — the engine persists after activity completion; subsequent tasks run later
      - **Transaction boundaries** — each async point creates a separate DB transaction; process
        survives server restarts between async steps
      - **Manual job execution** — `ManagementService.executeJob()` triggers async jobs in tests
        without a running job executor
      - **`failedJobRetryTimeCycle`** — ISO 8601 repeat expression (`R3/PT10M`) schedules retries
        with backoff on delegate failure
      - **Exclusive jobs** — `operaton:exclusive="true"` prevents parallel execution of jobs
        for the same process instance

      Essential for production deployments where service calls must survive transient failures.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: advanced
    tags:
      - { label: "Async", category: concept }
      - { label: "Job Executor", category: concept }
      - { label: "Transaction", category: concept }
      - { label: "Retry", category: concept }
    integrations: [postgres]
    bpmnConcepts: [async-before, async-after, job-executor, failed-job-retry-time-cycle]
    requires: "Java 21+, Docker"
    authors:
      - { name: "Karsten Thoms", url: "https://github.com/kthoms" }
    license: "Apache-2.0"
    documentationUrl: "https://github.com/kthoms/operaton-examples/blob/main/examples/17-async-continuation/README.md"
    lastUpdated: "2026-06-15"

  # ── Use Cases ──────────────────────────────────────────────────────────────

  - id: leave-request
    title: "Use Case — Leave Request"
    icon: "🏖️"
    path: use-cases/uc-01-leave-request
    shortDescription: >
      Employee leave approval with manager user task, non-interrupting timer escalation, and
      vacation balance validation via a service.
    longDescription: |
      A realistic HR use case that combines user tasks, timer escalation, and a backend service.

      - **Leave submission** — employee starts the process via REST with start and end dates
      - **Manager approval task** — assigned to the employee's manager via candidate group
      - **Non-interrupting timer escalation** — if the manager has not acted within 48 hours,
        an escalation email is sent; the task remains open
      - **Vacation balance service** — a delegate checks remaining days against a database;
        if insufficient, a `BpmnError` rejects the request immediately
      - **SQL schema initialisation** — `DataInitializer` creates and seeds the balance table
        on startup

      The integration test covers all three outcomes: approved, rejected (insufficient balance),
      and escalation triggered.
