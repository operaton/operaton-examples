  - id: travel-booking
    title: "Use Case ‚Äî Travel Booking SAGA"
    icon: "‚úàÔ∏è"
    path: examples/use-cases/travel-booking
    shortDescription: >
      BPMN transaction subprocess with cancel end event and cancel boundary event ‚Äî
      all-or-nothing flight, hotel, and car booking with automatic compensation rollback.
    longDescription: |
      A customer books a trip as a BPMN transaction subprocess: flight ‚Üí hotel ‚Üí car are
      reserved sequentially, then payment is charged. If the total exceeds the customer's
      budget, a cancel end event fires ‚Äî the engine automatically compensates every
      completed reservation (flight, hotel, car all cancelled) and routes to a "Trip
      cancelled" outcome via the cancel boundary event.

      - **Transaction subprocess** ‚Äî first coverage in the catalog; models an all-or-nothing SAGA
      - **Cancel end event** ‚Äî fires when payment is declined; implicitly triggers transaction cancellation
      - **Cancel boundary event** ‚Äî attached to the outer transaction; routes the cancelled outcome
      - **Compensation boundary events** ‚Äî auto-fired by the cancel; no manual throw needed
      - Distinct from `error-compensation`: that example uses a flat process with a manual
        intermediate compensation throw; this example uses the BPMN transaction construct itself
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: intermediate
