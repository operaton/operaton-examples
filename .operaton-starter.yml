  - id: call-activity
    title: "Call Activity"
    icon: "🔗"
    path: examples/call-activity
    shortDescription: >
      Process composition via call activity with variable in/out mappings and verification
      of child process history.
    longDescription: |
      Teaches how to build modular, reusable processes by composing them with **call activities**.

      - **Call activity** — `calledElement` references another process definition by key;
        the child process runs as an independent instance
      - **Variable in-mapping** — `operaton:in` copies parent variables into the child scope
      - **Variable out-mapping** — `operaton:out` propagates child output back to the parent
      - **Reusable child process** — the "creditCheck" subprocess can be called from any parent
      - **History verification** — the test asserts both the parent and child `HistoricProcessInstance`
        to confirm the full call tree completed correctly

      Real-world use: invoice processing calling a shared "payment" sub-process.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: intermediate
