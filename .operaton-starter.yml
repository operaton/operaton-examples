  - id: error-compensation
    title: "Error Compensation"
    icon: "‚Ü©Ô∏è"
    path: examples/error-compensation
    shortDescription: >
      BPMN compensation (saga pattern) with compensation handlers and BpmnError-triggered rollback.
    longDescription: |
      Models a distributed transaction using the **BPMN compensation** mechanism ‚Äî the process
      equivalent of a saga pattern.

      - **Compensation boundary event** ‚Äî attaches a rollback task to a completed activity
      - **Compensation handler** ‚Äî the task that undoes a prior step (e.g., refund a charge)
      - **Compensation throw event** ‚Äî explicitly triggers compensation for a scope
      - **BpmnError propagation** ‚Äî a delegate throws `BpmnError`; the boundary event catches it
        and triggers compensation
      - **Multi-step saga** ‚Äî three service tasks each with their own compensation handler,
        all triggered atomically on failure

      Compensation in BPMN does not use database rollback ‚Äî it executes compensating business logic.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: advanced
    tags:
      - { label: "Compensation", category: concept }
      - { label: "Saga Pattern", category: concept }
      - { label: "BpmnError", category: concept }
    integrations: [postgres]
    bpmnConcepts: [compensation-boundary-event, compensation-handler, compensation-throw-event, bpmn-error]
    requires: "Java 21+, Docker"
    authors:
      - { name: "Karsten Thoms", url: "https://github.com/kthoms" }
    license: "Apache-2.0"
    documentationUrl: "https://github.com/kthoms/operaton-examples/blob/main/examples/error-compensation/README.md"
