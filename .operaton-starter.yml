  - id: signal-events
    title: "Signal Events"
    icon: "📡"
    path: examples/14-signal-events
    shortDescription: >
      Signal broadcast vs. message point-to-point — intermediate catch/throw events and
      multi-subscriber fan-out.
    longDescription: |
      Contrasts **signals** (broadcast) with **messages** (point-to-point) — both common
      inter-process communication mechanisms.

      - **Signal Intermediate Throw Event** — the process broadcasts a named signal to all
        waiting receivers; no target instance specified
      - **Signal Intermediate Catch Event** — a process parks waiting for any broadcast of
        a named signal
      - **Signal Boundary Event** — interrupting and non-interrupting variants on a sub-process
      - **Multi-subscriber** — two independent process instances both receive the same signal
        broadcast; message correlation is not needed
      - **`RuntimeService.signalEventReceived()`** — programmatic signal delivery from outside
        the engine

      Use signals for publish/subscribe across process instances; use messages for targeted delivery.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: intermediate
    tags:
      - { label: "Signal", category: concept }
      - { label: "Broadcast", category: concept }
      - { label: "Inter-Process", category: concept }
    integrations: [postgres]
    bpmnConcepts: [signal-throw-event, signal-catch-event, signal-boundary-event]
