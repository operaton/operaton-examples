  - id: integration-kafka
    title: "Integration — Kafka"
    icon: "📨"
    path: examples/integration-kafka
    shortDescription: >
      Kafka listener starts a process instance, a delegate publishes a result event, and
      Awaitility assertions verify end-to-end async delivery.
    longDescription: |
      Shows how to integrate Operaton with Apache Kafka for event-driven process triggering
      and result publishing.

      - **Kafka → process start** — a `@KafkaListener` consumes an inbound event and calls
        `RuntimeService.startProcessInstanceByKey()` to kick off the process
      - **Delegate → Kafka** — a service task delegate publishes a result event to an output topic
      - **Testcontainers Kafka** — a real Kafka broker (Apache Kafka image) runs in the test JVM;
        no embedded Kafka
      - **Awaitility** — async assertion waits for the output message without `Thread.sleep`
      - **Variable passing** — the inbound Kafka message payload is mapped to process variables

      Pattern applies to any event-driven integration (RabbitMQ, AWS SQS, Azure Service Bus).
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: intermediate
