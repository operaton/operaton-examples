    icon: "üè•"
    path: examples/use-cases/insurance-claim
    shortDescription: >
      Insurance damage claim with event-based gateway racing message vs timer,
      parallel fraud check and damage appraisal, and DMN settlement decision.
    longDescription: |
      An insurance company processes a damage claim: requests supporting documents,
      then races a message event (documents received) against a timer (submission deadline)
      via an event-based gateway.

      If documents arrive in time, two parallel service tasks run concurrently ‚Äî a fraud
      check and a damage appraisal ‚Äî before a DMN table determines settlement.

      - **Event-based gateway** ‚Äî first coverage in the catalog; models a race between a
        message correlation and a timer expiry
      - **Parallel gateway (AND-split / AND-join)** ‚Äî concurrent fraud check and damage
        appraisal; also first in the catalog
      - **Message correlation by business key** ‚Äî `correlateMessage("documentsReceived", claimNumber)`
      - **DMN FIRST hit policy with FEEL outputs** ‚Äî `appraisedAmount * 0.8` in output entries
      - **ISO-8601 timer from process variable** ‚Äî `${documentDeadline}` in `timeDuration`
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
