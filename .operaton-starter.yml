    icon: "üè¶"
    path: examples/use-cases/loan-application
    shortDescription: >
      Loan origination with REST credit scoring, DMN risk assessment, and Spring Mail
      decision notifications.
    longDescription: |
      An end-to-end loan origination use case covering external REST integration, DMN-based
      risk decisioning, and email notification ‚Äî three common patterns in a single flow.

      - **REST credit scoring** ‚Äî a service task calls an external credit bureau (WireMocked
        in tests) and maps the score to a process variable
      - **DMN risk assessment** ‚Äî a Business Rule Task evaluates a decision table with the
        applicant's income, credit score, and loan amount to produce a risk rating
      - **Conditional approval** ‚Äî the exclusive gateway routes APPROVED, REVIEW, or REJECTED
        based on the DMN output
      - **Email notification** ‚Äî a Spring Mail delegate sends an HTML decision letter to
        the applicant; Mailpit verifies delivery in tests
      - **Manual review user task** ‚Äî borderline cases go to an underwriter task before
        the final decision

      Covers the full spectrum: external system ‚Üí rules engine ‚Üí human task ‚Üí notification.
