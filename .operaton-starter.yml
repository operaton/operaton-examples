  - id: inclusive-gateway
    title: "Inclusive Gateway"
    icon: "🔵"
    path: examples/inclusive-gateway
    shortDescription: >
      Inclusive (OR) gateway — multiple concurrent paths activated when conditions are true,
      join waits for all active tokens before continuing.
    longDescription: |
      The **inclusive gateway** is the "OR" counterpart to the exclusive (XOR) gateway.
      Multiple outgoing paths can be taken simultaneously, and the joining gateway waits
      for all active branches to complete before proceeding.

      - **Split** — three outgoing conditions evaluated; 1, 2, or all 3 paths may be taken
      - **Join** — the closing inclusive gateway waits only for the branches that were actually activated
      - **Default flow** — a default sequence flow taken if no condition evaluates to true
      - **Variable-driven branching** — process variable flags control which paths are active
      - **History assertion** — the test verifies exactly which intermediate activities ran

      Inclusive gateways model "do A, and optionally B and/or C" — common in approval and enrichment flows.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
