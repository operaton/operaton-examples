  - id: distribution-tomcat
    title: "Distribution ‚Äî Tomcat"
    icon: "üê±"
    path: examples/distribution-tomcat
    shortDescription: >
      Process-application WAR deployed into the operaton/tomcat Docker image ‚Äî shared-engine
      model, ServletProcessApplication, and Testcontainers e2e IT.
    longDescription: |
      Shows the **process application / shared engine** deployment model on Tomcat ‚Äî the traditional
      Java EE approach where the engine runs in the servlet container and WARs register themselves.

      - **`operaton/tomcat:2.1.1`** ‚Äî the official Operaton Tomcat distribution Docker image;
        engine and REST API pre-installed, no Spring Boot involved
      - **`ServletProcessApplication`** ‚Äî extends Operaton's base class, annotated `@WebListener`
        and `@ProcessApplication`; Tomcat auto-initialises it on WAR deploy
      - **`META-INF/processes.xml`** ‚Äî declares the process archive and enables BPMN class scanning
      - **`operaton:class`** ‚Äî plain Java delegate referenced by FQN; no CDI or Spring required
      - **WAR bytecode at JDK 17** ‚Äî the Tomcat image ships OpenJDK 17; main sources must
        compile at `--release 17` (test sources can stay at 21)
      - **Testcontainers e2e IT** ‚Äî `GenericContainer("operaton/tomcat:2.1.1")` + `PostgreSQLContainer`
        on a shared Docker network; WAR mounted at startup; REST API assertions with RestAssured
      - **History endpoint** ‚Äî `GET /engine-rest/history/activity-instance?activityType=noneEndEvent`
        is the correct way to assert the end event (the `/history/process-instance` response has
        no `endActivityId` field in Operaton 2.1.1)

      Two test paths: invoice ‚Üí EndEvent_Approved; contract ‚Üí EndEvent_Review.
