    lastUpdated: "2026-06-15"

  - id: timer-events
    title: "Timer Events"
    icon: "⏱️"
    path: examples/timer-events
    shortDescription: >
      Timer boundary event for SLA escalation, testing timers via job manipulation,
      and failedJobRetryTimeCycle configuration.
    longDescription: |
      Teaches time-based process control — how to escalate, cancel, or retry based on elapsed time.

      - **Non-interrupting timer boundary event** — fires an escalation email after an SLA without
        cancelling the original task
      - **Interrupting timer boundary event** — cancels the task and reroutes on timeout
      - **ISO 8601 duration** — `PT1H`, `R3/PT10M` (repeat) in BPMN `timeDuration`
      - **Testing with job API** — `ManagementService.executeJob()` triggers timers in tests
        without Thread.sleep or clock manipulation
      - **failedJobRetryTimeCycle** — configures automatic retry backoff on job failure

      Knowing how to test timers without real wall-clock waiting is essential for CI.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: intermediate
    tags:
      - { label: "Timer", category: concept }
      - { label: "SLA", category: concept }
      - { label: "Escalation", category: concept }
    integrations: [postgres]
    bpmnConcepts: [timer-boundary-event, non-interrupting-timer, job-executor, failed-job-retry]
    requires: "Java 21+, Docker"
    authors:
      - { name: "Karsten Thoms", url: "https://github.com/kthoms" }
    license: "Apache-2.0"
    documentationUrl: "https://github.com/kthoms/operaton-examples/blob/main/examples/timer-events/README.md"
