  - id: event-subprocess
    title: "Event Subprocess"
    icon: "🔔"
    path: examples/event-subprocess
    shortDescription: >
      Non-interrupting signal audit subprocess for cross-cutting concerns and interrupting
      error handler subprocess for global error handling.
    longDescription: |
      Demonstrates **event subprocesses** — special subprocesses that are triggered by events
      and run in the scope of their parent process or subprocess.

      - **Non-interrupting event subprocess** — triggered by a signal; the parent process continues
        in parallel; used for audit logging, side-effect notifications
      - **Interrupting event subprocess** — triggered by an error event; replaces the normal
        flow for global error handling (like a try/catch around the entire process)
      - **Scope hierarchy** — the event subprocess shares variables with its parent scope
      - **Embedded vs. top-level** — showing both an embedded event subprocess inside a
        subprocess and a top-level one at the process level

      Contrasts with boundary events: event subprocesses apply to the entire enclosing scope.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: intermediate
    tags:
      - { label: "Event Subprocess", category: concept }
      - { label: "Non-Interrupting", category: concept }
      - { label: "Interrupting", category: concept }
    integrations: [postgres]
    bpmnConcepts: [event-subprocess, non-interrupting-subprocess, signal-start-event, error-start-event]
