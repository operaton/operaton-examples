  - id: runtime-quarkus
    title: "Runtime ‚Äî Quarkus"
    icon: "‚òï"
    path: examples/runtime-quarkus
    shortDescription: >
      Embedded Operaton engine on Quarkus/CDI ‚Äî named CDI delegates, process deployment via
      OperatonEngineStartupEvent, and @QuarkusTest integration tests.
    longDescription: |
      Demonstrates that Operaton is not tied to Spring Boot ‚Äî the engine runs equally well
      on **Quarkus** with CDI bean injection and Agroal JDBC.

      - **`operaton-bpm-quarkus-engine`** ‚Äî the Quarkus extension providing a CDI-managed
        `ProcessEngine` bean and `ProcessEngineConfiguration`
      - **Named datasource** ‚Äî `quarkus.datasource.operaton-db.*` + `quarkus.operaton.datasource=operaton-db`
        connects the engine to a named Agroal pool
      - **CDI delegate** ‚Äî `@ApplicationScoped @Named("validateOrderDelegate")` resolved by
        `${validateOrderDelegate}` in the BPMN; no Spring annotation needed
      - **Explicit BPMN deployment** ‚Äî the Quarkus extension does NOT auto-scan the classpath;
        an `@Observes OperatonEngineStartupEvent` bean deploys the BPMN via `RepositoryService`
      - **`@QuarkusTest` + `QuarkusTestResourceLifecycleManager`** ‚Äî `PostgresTestResource`
        starts a Testcontainers Postgres and injects the JDBC URL before Quarkus boots
      - **assertj-core** ‚Äî must be declared explicitly; it is not transitive from the Quarkus BOM

      Two test scenarios: order total < 1000 ‚Üí approved; total ‚â• 1000 ‚Üí rejected.
