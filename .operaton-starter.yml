  - id: integration-connectors
    title: "Integration — Connectors"
    icon: "🔧"
    path: examples/integration-connectors
    shortDescription: >
      HTTP connector for declarative REST calls without Java delegates, plus a custom Connector
      SPI implementation with BpmnError propagation.
    longDescription: |
      Introduces the **Operaton Connector** mechanism — a first-class abstraction for binding
      BPMN service tasks to I/O integrations without writing `JavaDelegate` boilerplate.

      - **HTTP connector** — `connectorId="http-connector"` in the BPMN performs a REST call
        declaratively; URL, method, and headers are set via `<operaton:inputOutput>` inside the BPMN,
        no Java code needed for the service task
      - **Custom Connector SPI** — `ConnectorProvider` and `AbstractConnector` implement a
        `currency-convert` connector that reads exchange rates and converts amounts
      - **`AbstractConnectorResponse.collectResponseParameters()`** — the correct API for
        returning output from a connector (not a setter)
      - **BpmnError from a connector** — `execute()` throws `new BpmnError("RATE_UNAVAILABLE")`
        when the exchange rate is unparseable; caught by a boundary error event
      - **`ConnectProcessEnginePlugin`** — explicit plugin registration required; connectors
        are not auto-activated in Spring Boot without it
      - **WireMock Testcontainers** — the exchange-rate REST service is stubbed; both the
        success path and the 404 error path are tested end-to-end

      The `META-INF/services/org.operaton.connect.spi.ConnectorProvider` SPI file is the
      registration mechanism; the full implementation is ~50 lines of Java.
