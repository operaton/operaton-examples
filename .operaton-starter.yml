  - id: message-events
    title: "Message Events"
    icon: "‚úâÔ∏è"
    path: examples/message-events
    shortDescription: >
      Message start event, intermediate message catch, and business-key correlation ‚Äî
      integrating external systems by sending named messages.
    longDescription: |
      Shows how processes communicate with the outside world using **message events** ‚Äî
      the standard BPMN mechanism for point-to-point, named, correlated messages.

      - **Message Start Event** ‚Äî a REST call delivers a message to start a new process instance
      - **Intermediate Message Catch Event** ‚Äî the process parks at a wait state until a message arrives
      - **Business key correlation** ‚Äî `RuntimeService.correlateMessage()` with a business key finds
        the right waiting instance without knowing its internal ID
      - **Two-message flow** ‚Äî process starts on one message and resumes on a second message

      Real-world patterns: order placed ‚Üí order shipped, payment initiated ‚Üí payment confirmed.
    buildSystem: maven
    runtime: spring-boot
    operatonVersion: "2.1.1"
    javaVersion: "21"
    complexity: intermediate
    tags:
