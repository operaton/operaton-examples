      (QuoteRequest, QuoteResponse, OrderDecision) within one engine. Demonstrates the message
      Correlation API and async continuation decoupling.
    longDescription: |
      The first collaboration / message-flow example in the catalog.

      - **Two executable process definitions** — `purchase-request` (Buyer) and `quote-handling` (Supplier)
        deployed in one Spring Boot application
      - **correlateStartMessage()** — starts a supplier instance from the buyer's send task
      - **processInstanceVariableEquals()** — routes QuoteResponse and OrderDecision to the correct
        counterpart using `requestId` as the correlation key
      - **asyncBefore on supplier start event** — `correlateStartMessage()` returns before the supplier
        runs; **asyncAfter on buyer catch event** — buyer's EvaluateQuote+SendOrderDecision runs as a
        separate job after the supplier has already registered its OrderDecision subscription (eliminates
        the correlation timing race)
      - **Exclusive gateway** — supplier routes on `${accepted}` to either reserve stock or release the quote

      Four integration tests prove: deployment, within-budget (order placed + stock reserved),
      over-budget (order declined + quote released), and cross-correlation correctness with two
      concurrent buyer instances.
