  - id: loan-application
    title: "Use Case — Loan Application"
    icon: "🏦"
    path: use-cases/uc-02-loan-application
    shortDescription: >
      Loan origination with REST credit scoring, DMN risk assessment, and Spring Mail
      decision notifications.
    longDescription: |
      An end-to-end loan origination use case covering external REST integration, DMN-based
      risk decisioning, and email notification — three common patterns in a single flow.

      - **REST credit scoring** — a service task calls an external credit bureau (WireMocked
        in tests) and maps the score to a process variable
      - **DMN risk assessment** — a Business Rule Task evaluates a decision table with the
        applicant's income, credit score, and loan amount to produce a risk rating
      - **Conditional approval** — the exclusive gateway routes APPROVED, REVIEW, or REJECTED
        based on the DMN output
      - **Email notification** — a Spring Mail delegate sends an HTML decision letter to
        the applicant; Mailpit verifies delivery in tests
      - **Manual review user task** — borderline cases go to an underwriter task before
        the final decision

      Covers the full spectrum: external system → rules engine → human task → notification.
